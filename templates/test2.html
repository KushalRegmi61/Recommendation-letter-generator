{% extends 'base2.html' %}

{% block title %}Edit Letter{% endblock title %}
{% block body %}
<div class="a4-preview">
    <div class="a4-paper">
        <h2 style="text-align:center;">Letter of Recommendation</h2>
        <!-- editable container allows professor to tweak text before downloading -->
        <div id="letter_editable" contenteditable="true" style="white-space: pre-line; font-size: 16px;">
            {{ letter|safe }}
        </div>
    </div>
</div>
<div style="text-align:center; margin-top:30px; display: flex; justify-content: center; gap: 20px;">
    <form method="post" action="/download_letter/" id="pdfForm" style="display:inline;" onsubmit="prepareEdit()">
        {% csrf_token %}
        <input type="hidden" name="roll" value="{{student.std.roll_number}}">
        <input type="hidden" name="template_id" value="{{ template_id }}">
        <textarea name="edited_letter" class="edited_letter" style="display:none;"></textarea>
        <input type="hidden" name="format" value="pdf">
        <button type="submit" class="cta-add">Download as PDF</button>
    </form>
    <form method="post" action="/download_letter/" id="docxForm" style="display:inline;" onsubmit="prepareEdit()">
        {% csrf_token %}
        <input type="hidden" name="roll" value="{{student.std.roll_number}}">
        <input type="hidden" name="template_id" value="{{ template_id }}">
        <textarea name="edited_letter" class="edited_letter" style="display:none;"></textarea>
        <input type="hidden" name="format" value="docx">
        <button type="submit" class="cta-add">Download as DOCX</button>
    </form>
</div>
<style>
.a4-preview {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    background: #f0f0f0;
    padding: 40px 0 60px 0; /* Extra bottom padding for buttons */
}
.a4-paper {
    width: 794px;
    max-height: 1123px; /* one page height */
    min-height: 1123px;
    background: #fff;
    box-shadow: 0 0 10px rgba(0,0,0,0.15);
    padding: 48px 60px;
    margin: 0 auto 40px auto; /* bottom margin for page separation */
    border-radius: 4px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    overflow-y: auto;              /* allow scrolling when content overflows */
    page-break-after: always;      /* ensure printed PDF breaks pages here */
}
</style>
<script>
    // Copy the edited letter into every form's hidden textarea before submitting.
    function prepareEdit() {
        var editable = document.getElementById('letter_editable');
        if (!editable) { return; }
        var fields = document.getElementsByClassName('edited_letter');
        for (var i = 0; i < fields.length; i++) {
            fields[i].value = editable.innerText;
        }
    }
</script>
{% endblock body %}
